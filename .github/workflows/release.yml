name: Publish release assets

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release with script assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            Remove-MSBloat.ps1 \
            Remove-MSBloat-GUI.ps1 \
            MSBloat.Core.ps1 \
            --generate-notes
